
<!DOCTYPE html>
<html>
<head>
<title>TaskFlow Lite</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h2 { text-align: center; }
input { width: 70%; padding: 8px; margin:5px 0; }
button { padding: 8px; border:none; border-radius:5px; cursor:pointer; }
.add-btn { background: green; color:white; }
ul { list-style:none; padding:0; }
li {
    background:#f4f4f4;
    margin:8px 0;
    padding:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
}
.completed { text-decoration: line-through; color:gray; background:#d4edda; }
.complete-btn { background:blue; color:white; }
.delete-btn { background:red; color:white; }
</style>
</head>
<body>
<div class="container">
<h2>TaskFlow Lite</h2>
<input id="title" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add</button>
<br><br>
<input id="search" placeholder="Search task..." onkeyup="searchTask()">
<ul id="list"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
